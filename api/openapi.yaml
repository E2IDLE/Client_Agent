openapi: "3.0.3"
info:
  title: "Direct P2P - Local Agent API"
  description: |
    Direct P2P 로컬 에이전트 API 명세서.
    사용자 PC에서 실행되는 로컬 에이전트와 통신하기 위한 API입니다.
    localhost(127.0.0.1)에만 바인딩되어 외부 접근이 차단됩니다.
    세션 요청 시 토큰을 발급하여 다른 프로그램이 이 세션을 가로채지 못하도록 합니다.
  version: "1.0.0"
  contact:
    name: "Direct P2P 개발팀"

servers:
  - url: "http://127.0.0.1:17432"
    description: "로컬 에이전트 (localhost 전용)"

tags:
  - name: "상태"
    description: "에이전트 상태 조회"
  - name: "전송"
    description: "파일 전송 진행 및 제어"
  - name: "피어"
    description: "연결된 피어 관리 및 데이터 전송"
  - name: "로그"
    description: "에이전트 로그 조회"
  - name: "편집"
    description: "영상 컷 편집"

paths:
  /status:
    get:
      tags:
        - "상태"
      summary: "에이전트 상태 조회"
      description: "로컬 에이전트의 현재 상태, NAT 타입, 연결 정보 등을 반환합니다."
      operationId: "getAgentStatus"
      responses:
        "200":
          description: "에이전트 상태 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - "상태"
      summary: "에이전트 상태 수정"
      description: "에이전트 이름 등을 수정합니다."
      operationId: "patchAgentStatus"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAgentStatusRequest"
      responses:
        "200":
          description: "에이전트 상태 수정 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResponse"
        "400":
          description: "요청이 부적절함"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transfer/progress:
    get:
      tags:
        - "전송"
      summary: "전송 진행 상황 조회"
      description: "현재 파일 전송의 진행 상황을 파일별 상세 정보와 함께 반환합니다."
      operationId: "getTransferProgress"
      responses:
        "200":
          description: "전송 진행 상황 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferProgress"
        "404":
          description: "진행 중인 전송 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - "전송"
      summary: "전송 상태 수정"
      description: "현재 파일 전송의 진행 상황을 파일별 상세 정보와 함께 반환합니다."
      operationId: "patchTransferProgress"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTransferRequest"
      responses:
        "200":
          description: "전송 진행 상황 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferProgress"
        "404":
          description: "진행 중인 전송 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transfer/cancel:
    post:
      tags:
        - "전송"
      summary: "전송 취소"
      description: "현재 진행 중인 파일 전송을 취소합니다. 이미 전송된 바이트 수를 반환합니다."
      operationId: "cancelTransfer"
      responses:
        "200":
          description: "전송 취소 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTransferResponse"
        "404":
          description: "진행 중인 전송 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /peers:
    get:
      tags:
        - "피어"
      summary: "연결된 피어 목록 조회"
      description: "현재 연결된 또는 최근 연결되었던 피어 목록을 반환합니다."
      operationId: "getPeers"
      responses:
        "200":
          description: "피어 목록 조회 성공"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PeerInfo"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - "피어"
      summary: "대상 피어와 연결하기"
      description: "대상 피어와 연결을 시도합니다"
      operationId: "postPeers"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostPeersRequest"
      responses:
        "200":
          description: "피어 목록 조회 성공"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PeerInfo"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /peers/{peerId}:
    post:
      tags:
        - "피어"
      summary: "특정 피어에게 파일 전송"
      description: "지정된 피어에게 파일 전송을 시작합니다. 전송 ID가 발급됩니다."
      operationId: "sendDataToPeer"
      parameters:
        - name: peerId
          in: path
          required: true
          description: "대상 피어 ID"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendDataRequest"
      responses:
        "202":
          description: "전송 요청 수락됨"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendDataResponse"
        "400":
          description: "잘못된 요청 (파일 목록 누락 등)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "해당 피어를 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "이미 전송이 진행 중임"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /logs:
    get:
      tags:
        - "로그"
      summary: "에이전트 로그 조회"
      description: "에이전트의 동작 로그를 필터링 조건에 따라 조회합니다."
      operationId: "getLogs"
      parameters:
        - name: level
          in: query
          required: false
          description: "로그 레벨 필터"
          schema:
            type: string
            enum:
              - debug
              - info
              - warn
              - error
        - name: limit
          in: query
          required: false
          description: "조회할 로그 수 (기본값: 100)"
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: "건너뛸 로그 수 (기본값: 0)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: since
          in: query
          required: false
          description: "이 시각 이후의 로그만 조회 (ISO 8601 형식)"
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: "로그 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogResponse"
        "400":
          description: "잘못된 쿼리 파라미터"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # /edit — 영상 컷 편집
  # ──────────────────────────────────────────────
  /edit:
    post:
      tags:
        - "편집"
      summary: "영상 컷 편집 작업 요청"
      description: |
        영상 파일에 대해 컷 편집 작업을 요청합니다.
        `segments` 배열에 잘라낼 구간(시작/끝 타임스탬프 페어)을 순서대로 전달하면,
        해당 구간들이 순서대로 이어붙여진 결과 영상을 생성합니다.
        타임스탬프는 초 단위 소수점 형식(예: 12.5)으로 전달합니다.
      operationId: "postEdit"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditRequest"
      responses:
        "202":
          description: "편집 작업 요청 수락됨"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditAcceptedResponse"
        "400":
          description: "잘못된 요청 (필수 필드 누락, 타임스탬프 범위 오류 등)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "원본 영상 파일을 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "이미 편집 작업이 진행 중임"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /edit/{editId}:
    get:
      tags:
        - "편집"
      summary: "편집 작업 진행 상황 조회"
      description: "editId에 해당하는 편집 작업의 현재 진행 상황과 결과를 조회합니다."
      operationId: "getEditStatus"
      parameters:
        - name: editId
          in: path
          required: true
          description: "편집 작업 ID"
          schema:
            type: string
            example: "edit_abc123"
      responses:
        "200":
          description: "편집 작업 상태 조회 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditStatusResponse"
        "404":
          description: "해당 편집 작업을 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - "편집"
      summary: "편집 작업 취소"
      description: "진행 중인 편집 작업을 취소합니다. 이미 완료된 작업은 취소할 수 없습니다."
      operationId: "deleteEdit"
      parameters:
        - name: editId
          in: path
          required: true
          description: "취소할 편집 작업 ID"
          schema:
            type: string
            example: "edit_abc123"
      responses:
        "200":
          description: "편집 작업 취소 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditCancelResponse"
        "404":
          description: "해당 편집 작업을 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "이미 완료된 작업이므로 취소 불가"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "에이전트 내부 오류"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    # ──────────────────────────────────────────────
    # 1. AgentStatusResponse — GET /status 응답
    # ──────────────────────────────────────────────
    AgentStatusResponse:
      type: object
      description: "에이전트 상태 정보"
      required:
        - agentVersion
        - status
        - uptime
        - accountLinked
        - apiServerConnected
      properties:
        agentName:
          type: string
          description: "에이전트 이름"
          example: "작업실"
        agentVersion:
          type: string
          description: "에이전트 버전"
          example: "1.0.0"
        status:
          type: string
          description: "에이전트 현재 상태"
          enum:
            - idle
            - connecting
            - connected
            - transferring
            - error
        uptime:
          type: integer
          description: "에이전트 실행 시간 (초)"
          example: 3600
        multiAddress:
          type: string
          nullable: true
          description: "libp2p로 생성된 multi address"
          example: "ip4/203.0.113.45/..."
        natType:
          type: string
          nullable: true
          description: "감지된 NAT 타입"
          enum:
            - full_cone
            - restricted_cone
            - port_restricted_cone
            - symmetric
            - unknown
        connectedPeer:
          type: array
          nullable: true
          description: "현재 연결된 피어 정보 목록 (미연결 시 null)"
          items:
            type: object
            properties:
              nickname:
                type: string
                description: "피어 닉네임"
              address:
                type: string
                description: "피어 multi address"
              connectionType:
                type: string
                description: "연결 유형"
                enum:
                  - p2p
                  - relay
              rtt:
                type: integer
                description: "왕복 지연 시간 (밀리초)"

    # ──────────────────────────────────────────────
    # 2. PatchAgentStatusRequest — PATCH /status 요청
    # ──────────────────────────────────────────────
    PatchAgentStatusRequest:
      type: object
      description: "에이전트 수정 요청"
      required:
        - name
      properties:
        name:
          type: string
          description: "이름"

    # ──────────────────────────────────────────────
    # 3. FileInfo — SendDataRequest에서 재사용
    # ──────────────────────────────────────────────
    FileInfo:
      type: object
      description: "전송 대상 파일 정보"
      required:
        - name
        - path
        - size
      properties:
        name:
          type: string
          description: "파일 이름"
          example: "document.pdf"
        path:
          type: string
          description: "파일 로컬 경로"
          example: "/home/user/documents/document.pdf"
        size:
          type: integer
          format: int64
          description: "파일 크기 (바이트)"
          example: 1048576
        mimeType:
          type: string
          description: "파일 MIME 타입"
          example: "application/pdf"

    # ──────────────────────────────────────────────
    # 4. TransferProgress — GET /transfer/progress 응답
    # ──────────────────────────────────────────────
    TransferProgress:
      type: object
      description: "파일 전송 진행 상황"
      required:
        - status
        - files
        - totalSize
        - totalTransferred
        - totalProgress
        - currentSpeed
        - averageSpeed
      properties:
        status:
          type: string
          description: "전송 상태"
          enum:
            - preparing
            - transferring
            - completed
            - failed
            - cancelled
        files:
          type: array
          description: "파일별 전송 진행 상황"
          items:
            type: object
            description: "개별 파일 전송 진행 정보"
            required:
              - peerId
              - name
              - size
              - transferredBytes
              - progress
              - speed
            properties:
              peerId:
                type: string
                description: "피어 고유 ID"
                example: "peer_xyz789"
              name:
                type: string
                description: "파일 이름"
                example: "document.pdf"
              size:
                type: integer
                format: int64
                description: "파일 전체 크기 (바이트)"
                example: 1048576
              transferredBytes:
                type: integer
                format: int64
                description: "전송 완료된 바이트 수"
                example: 524288
              progress:
                type: number
                format: double
                description: "전송 진행률 (0∼100)"
                minimum: 0
                maximum: 100
                example: 50.0
              speed:
                type: integer
                description: "현재 전송 속도 (바이트/초)"
                example: 1048576
        totalSize:
          type: integer
          format: int64
          description: "전체 파일 총 크기 (바이트)"
          example: 10485760
        totalTransferred:
          type: integer
          format: int64
          description: "전체 전송 완료된 바이트 수"
          example: 5242880
        totalProgress:
          type: number
          format: double
          description: "전체 전송 진행률 (0∼100)"
          minimum: 0
          maximum: 100
          example: 50.0
        currentSpeed:
          type: integer
          description: "현재 전송 속도 (바이트/초)"
          example: 2097152
        averageSpeed:
          type: integer
          description: "평균 전송 속도 (바이트/초)"
          example: 1572864
        eta:
          type: integer
          nullable: true
          description: "예상 남은 시간 (초, 산출 불가 시 null)"
          example: 120
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: "전송 시작 시각 (ISO 8601, 미시작 시 null)"

    # ──────────────────────────────────────────────
    # 5. CancelTransferResponse — POST /transfer/cancel 응답
    # ──────────────────────────────────────────────
    CancelTransferResponse:
      type: object
      description: "전송 취소 응답"
      required:
        - cancelled
        - transferredBytes
      properties:
        cancelled:
          type: boolean
          description: "취소 성공 여부"
          example: true
        transferredBytes:
          type: integer
          format: int64
          description: "취소 시점까지 전송된 바이트 수"
          example: 5242880

    # ──────────────────────────────────────────────
    # 6. PeerInfo — GET /peers 응답 배열 항목
    # ──────────────────────────────────────────────
    PeerInfo:
      type: object
      description: "피어 정보"
      required:
        - peerId
        - nickname
        - connectionType
        - status
      properties:
        peerId:
          type: string
          description: "피어 고유 ID"
          example: "peer_xyz789"
        nickname:
          type: string
          description: "피어 닉네임"
          example: "홍길동"
        connectionType:
          type: string
          description: "연결 유형"
          enum:
            - p2p
            - relay
        status:
          type: string
          description: "피어 연결 상태"
          enum:
            - connected
            - disconnected
        rtt:
          type: integer
          nullable: true
          description: "왕복 지연 시간 (밀리초, 미측정 시 null)"
          example: 15
        packetLoss:
          type: number
          format: double
          nullable: true
          description: "패킷 손실률 (0∼100, 미측정 시 null)"
          minimum: 0
          maximum: 100
          example: 0.5
        multiAddress:
          type: string
          nullable: true
          description: "피어의 multi address"
          example: "ip4/198.51.100.22/..."

    # ──────────────────────────────────────────────
    # 7. SendDataRequest — POST /peers/{peerId} 요청
    # ──────────────────────────────────────────────
    SendDataRequest:
      type: object
      description: "특정 피어에게 파일 전송 요청"
      required:
        - files
      properties:
        files:
          type: array
          description: "전송할 파일 목록"
          minItems: 1
          items:
            $ref: "#/components/schemas/FileInfo"

    # ──────────────────────────────────────────────
    # 8. PostPeersRequest — POST /peers 요청
    # ──────────────────────────────────────────────
    PostPeersRequest:
      type: object
      description: "특정 피어와 연결 요청"
      properties:
        peerId:
          type: string
          description: "피어 고유 ID"
          example: "peer_xyz789"
        peerMultiAddress:
          type: string
          description: "상대방 주소"
          example: "127.0.0.1/::/..."

    # ──────────────────────────────────────────────
    # 9. PatchTransferRequest — PATCH /transfer/progress 요청
    # ──────────────────────────────────────────────
    PatchTransferRequest:
      type: object
      description: "전송 상태 변경"
      required:
        - speed
      properties:
        speed:
          type: integer
          description: "전송 제한속도 (byte)"
          example: 1000

    # ──────────────────────────────────────────────
    # 10. SendDataResponse — POST /peers/{peerId} 응답
    # ──────────────────────────────────────────────
    SendDataResponse:
      type: object
      description: "파일 전송 요청 수락 응답"
      required:
        - transferId
        - message
      properties:
        transferId:
          type: string
          description: "발급된 전송 ID"
          example: "txn_def456"
        message:
          type: string
          description: "응답 메시지"
          example: "전송 요청이 수락되었습니다."

    # ──────────────────────────────────────────────
    # 11. LogResponse — GET /logs 응답
    # ──────────────────────────────────────────────
    LogResponse:
      type: object
      description: "에이전트 로그 조회 응답"
      required:
        - logs
        - totalCount
      properties:
        logs:
          type: array
          description: "로그 항목 목록"
          items:
            type: object
            description: "개별 로그 항목"
            required:
              - timestamp
              - level
              - category
              - message
            properties:
              timestamp:
                type: string
                format: date-time
                description: "로그 발생 시각 (ISO 8601)"
              level:
                type: string
                description: "로그 레벨"
                enum:
                  - debug
                  - info
                  - warn
                  - error
              category:
                type: string
                description: "로그 카테고리"
                enum:
                  - stun
                  - holepunch
                  - turn
                  - transfer
                  - agent
                  - connection
              message:
                type: string
                description: "로그 메시지"
                example: "STUN 서버로부터 공인 IP를 획득했습니다."
              detail:
                type: string
                nullable: true
                description: "추가 상세 정보 (없으면 null)"
        totalCount:
          type: integer
          description: "필터 조건에 해당하는 전체 로그 수"
          example: 250

    # ──────────────────────────────────────────────
    # 12. EditSegment — 컷 편집 구간 (시작/끝 타임스탬프 페어)
    # ──────────────────────────────────────────────
    EditSegment:
      type: object
      description: |
        컷 편집 구간 하나를 나타냅니다.
        start ~ end 구간의 영상이 결과물에 포함됩니다.
        segments 배열의 인덱스 순서가 곧 결과 영상의 이어붙임 순서입니다.
      required:
        - order
        - start
        - end
      properties:
        order:
          type: integer
          description: "구간의 순서 (1부터 시작, 결과 영상에서 이어붙여지는 순서)"
          minimum: 1
          example: 1
        start:
          type: number
          format: double
          description: "구간 시작 타임스탬프 (초, 소수점 허용)"
          minimum: 0
          example: 0.0
        end:
          type: number
          format: double
          description: "구간 종료 타임스탬프 (초, 소수점 허용). start보다 커야 합니다."
          minimum: 0
          example: 12.5
        label:
          type: string
          nullable: true
          description: "구간에 대한 선택적 레이블 (식별 목적, 처리에 영향 없음)"
          example: "오프닝"

    # ──────────────────────────────────────────────
    # 13. EditRequest — POST /edit 요청
    # ──────────────────────────────────────────────
    EditRequest:
      type: object
      description: "영상 컷 편집 요청"
      required:
        - sourcePath
        - outputPath
        - segments
      properties:
        sourcePath:
          type: string
          description: "원본 영상 파일의 로컬 경로"
          example: "/home/user/videos/raw.mp4"
        outputPath:
          type: string
          description: "편집 결과 영상이 저장될 로컬 경로"
          example: "/home/user/videos/edited.mp4"
        segments:
          type: array
          description: |
            편집할 구간 목록. order 필드 기준으로 오름차순 정렬되어 결과 영상에 이어붙여집니다.
            최소 1개 이상이어야 하며, 각 구간의 start < end 조건을 만족해야 합니다.
            구간끼리 시간이 겹쳐도 되며, 원본의 같은 구간을 여러 번 포함할 수 있습니다.
          minItems: 1
          items:
            $ref: "#/components/schemas/EditSegment"
        outputFormat:
          type: string
          nullable: true
          description: "출력 파일 형식 (미지정 시 원본 형식 유지)"
          enum:
            - mp4
            - mkv
            - mov
            - avi
            - webm
          example: "mp4"
        reEncoding:
          type: boolean
          nullable: true
          description: |
            재인코딩 여부. false이면 스트림 복사 방식으로 빠르게 처리되지만
            키프레임 경계에서 약간의 오차가 생길 수 있습니다.
            true이면 정확한 컷 편집이 가능하나 처리 시간이 길어집니다. (기본값: false)
          default: false
          example: false

    # ──────────────────────────────────────────────
    # 14. EditAcceptedResponse — POST /edit 202 응답
    # ──────────────────────────────────────────────
    EditAcceptedResponse:
      type: object
      description: "편집 작업 수락 응답"
      required:
        - editId
        - status
        - message
        - segmentCount
      properties:
        editId:
          type: string
          description: "발급된 편집 작업 ID (진행 상황 조회 및 취소에 사용)"
          example: "edit_abc123"
        status:
          type: string
          description: "편집 작업 초기 상태"
          enum:
            - pending
          example: "pending"
        message:
          type: string
          description: "응답 메시지"
          example: "편집 작업이 요청되었습니다."
        segmentCount:
          type: integer
          description: "처리될 구간 수"
          example: 3
        estimatedDuration:
          type: number
          format: double
          nullable: true
          description: "결과 영상의 예상 총 길이 (초, 산출 불가 시 null)"
          example: 47.3

    # ──────────────────────────────────────────────
    # 15. EditStatusResponse — GET /edit/{editId} 응답
    # ──────────────────────────────────────────────
    EditStatusResponse:
      type: object
      description: "편집 작업 진행 상황 응답"
      required:
        - editId
        - status
        - sourcePath
        - outputPath
        - segments
        - progress
      properties:
        editId:
          type: string
          description: "편집 작업 ID"
          example: "edit_abc123"
        status:
          type: string
          description: "편집 작업 현재 상태"
          enum:
            - pending
            - processing
            - completed
            - failed
            - cancelled
          example: "processing"
        sourcePath:
          type: string
          description: "원본 영상 파일 경로"
          example: "/home/user/videos/raw.mp4"
        outputPath:
          type: string
          description: "결과 영상 파일 경로"
          example: "/home/user/videos/edited.mp4"
        segments:
          type: array
          description: "요청된 편집 구간 목록"
          items:
            $ref: "#/components/schemas/EditSegment"
        progress:
          type: number
          format: double
          description: "편집 진행률 (0∼100)"
          minimum: 0
          maximum: 100
          example: 45.0
        currentSegmentOrder:
          type: integer
          nullable: true
          description: "현재 처리 중인 구간의 order 값 (처리 전/완료 시 null)"
          example: 2
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: "편집 작업 시작 시각 (ISO 8601, 미시작 시 null)"
          example: "2024-06-01T12:00:00Z"
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: "편집 작업 완료 시각 (ISO 8601, 미완료 시 null)"
          example: null
        eta:
          type: integer
          nullable: true
          description: "예상 남은 시간 (초, 산출 불가 시 null)"
          example: 30
        errorDetail:
          type: string
          nullable: true
          description: "실패 시 오류 상세 메시지 (정상 시 null)"
          example: null
        outputSize:
          type: integer
          format: int64
          nullable: true
          description: "완료된 결과 영상 파일 크기 (바이트, 미완료 시 null)"
          example: null

    # ──────────────────────────────────────────────
    # 16. EditCancelResponse — DELETE /edit/{editId} 응답
    # ──────────────────────────────────────────────
    EditCancelResponse:
      type: object
      description: "편집 작업 취소 응답"
      required:
        - editId
        - cancelled
        - message
      properties:
        editId:
          type: string
          description: "취소된 편집 작업 ID"
          example: "edit_abc123"
        cancelled:
          type: boolean
          description: "취소 성공 여부"
          example: true
        message:
          type: string
          description: "응답 메시지"
          example: "편집 작업이 취소되었습니다."
        progressAtCancel:
          type: number
          format: double
          nullable: true
          description: "취소 시점의 진행률 (0∼100, 확인 불가 시 null)"
          example: 45.0

    # ──────────────────────────────────────────────
    # 17. ErrorResponse — 모든 에러 응답
    # ──────────────────────────────────────────────
    ErrorResponse:
      type: object
      description: "에러 응답"
      required:
        - code
        - message
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          description: "에러 메시지"
          example: "세션을 찾을 수 없습니다."
        detail:
          type: string
          nullable: true
          description: "에러 상세 정보 (없으면 null)"
          example: "sessionId: sess_abc123에 해당하는 세션이 존재하지 않습니다."

    # ──────────────────────────────────────────────
    # 18. ErrorCode — ErrorResponse에서 $ref 참조
    # ──────────────────────────────────────────────
    ErrorCode:
      type: string
      description: |
        에러 코드 목록:
        - E1001: 잘못된 요청 파라미터
        - E1002: 필수 필드 누락
        - E2001: 세션을 찾을 수 없음
        - E2002: 세션이 이미 존재함 (중복 생성 시도)
        - E3001: 피어를 찾을 수 없음
        - E3002: 피어 연결 실패
        - E4001: 전송 초기화 실패
        - E4002: 전송 중 오류 발생
        - E4003: 전송이 이미 진행 중
        - E5001: NAT 탐지 실패
        - E5002: 홀펀칭 실패
        - E6001: 에이전트 내부 오류
        - E7001: 편집 작업을 찾을 수 없음
        - E7002: 편집 작업이 이미 진행 중
        - E7003: 원본 영상 파일을 찾을 수 없음
        - E7004: 유효하지 않은 타임스탬프 (start >= end, 또는 범위 초과)
        - E7005: 편집 처리 중 오류 발생
        - E7006: 이미 완료된 작업으로 취소 불가
      enum:
        - E1001
        - E1002
        - E2001
        - E2002
        - E3001
        - E3002
        - E4001
        - E4002
        - E4003
        - E5001
        - E5002
        - E6001
        - E7001
        - E7002
        - E7003
        - E7004
        - E7005
        - E7006
